<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:wght@400;600;700&display=swap');
:root {
  --gold:#c9a84c; --gold2:#f0cc70;
  --bg:#090910; --bg2:#111120; --bg3:#1a1a30;
  --text:#e8e0d0; --dim:#667788;
  --green:#4aaa78; --red:#e86c4a; --blue:#4a88cc;
  --st: env(safe-area-inset-top,44px);
  --sb: env(safe-area-inset-bottom,34px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;padding-bottom:calc(72px + var(--sb));min-height:100vh;}
.header{background:#0d0d22;padding:calc(var(--st) + 12px) 18px 14px;border-bottom:1px solid #c9a84c22;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
.title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.badge{background:var(--gold);color:#090910;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#0d0d1e;border-top:1px solid #2a2a4e;padding:8px 0 calc(var(--sb));display:flex;}
.nb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;}
.ni{font-size:22px;}
.nl{font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--dim);}
.nb.on .nl{color:var(--gold);}
.screen{display:none;padding:14px 16px;animation:fi 0.2s ease;}
.screen.on{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--bg2);border:1px solid #2a2a3e;border-radius:14px;margin-bottom:10px;overflow:hidden;}
.ch{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.cb{padding:0 16px 12px;border-top:1px solid #1e1e34;display:none;}
.cb.on{display:block;}
.chev{color:var(--gold);font-size:14px;transition:transform 0.2s;flex-shrink:0;}
.chev.on{transform:rotate(180deg);}
.ex{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid #14142a;gap:10px;}
.ex:last-child{border:none;}
.en{font-size:13px;color:var(--text);}
.enote{font-size:11px;color:#4a6a7a;margin-top:2px;font-style:italic;}
.es{background:#1a1a34;padding:4px 10px;border-radius:8px;color:var(--gold);font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0;}
.wgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:14px;}
.wb{aspect-ratio:1;border-radius:11px;border:1.5px solid #2a2a4e;background:var(--bg2);color:var(--dim);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
.wb.done{border-color:#2a4a2a;background:#0d1f0d;color:var(--green);}
.wb.cur{background:var(--gold);border-color:var(--gold);color:#090910;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.mc{background:#0f0f1e;border-radius:11px;padding:12px 14px;}
.ml{font-size:11px;color:var(--dim);}
.mv{font-size:15px;font-weight:700;margin-top:3px;}
.mi{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #14142a;font-size:13px;color:#c0b8a8;}
.mi:last-child{border:none;}
.dot{color:var(--gold);font-size:10px;margin-top:2px;flex-shrink:0;}
.st{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.dp{background:#c9a84c18;color:var(--gold);font-size:10px;padding:2px 8px;border-radius:6px;letter-spacing:1px;}
.ic{background:var(--bg2);border:1px solid #2a2a3e;border-radius:13px;padding:13px 15px;margin-bottom:9px;display:flex;gap:11px;}
.rbox{background:#0d1f0d;border:1px solid #2a4a2a;border-radius:13px;padding:15px;margin-top:6px;}
.wbox{background:var(--bg2);border:1px solid #2a2a3e;border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.pbtn{flex:1;padding:8px 4px;border-radius:8px;border:1px solid #2a2a4e;background:var(--bg);color:var(--dim);font-size:11px;cursor:pointer;font-weight:600;}
.pbtn.done{border-color:#2a4a2a;background:#0d1f0d;color:var(--green);}
.ring-wrap{position:relative;width:150px;height:150px;margin:0 auto 20px;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rnum{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--gold);line-height:1;}
.rsub{font-size:10px;color:var(--dim);letter-spacing:1px;}
</style>
</head>

function mo(w){ return w<=4?1:w<=8?2:3; }

function go(tab, btn){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  document.getElementById('s-'+tab).classList.add('on');
  btn.classList.add('on');
  OC=null; OM=null;
  if(tab==='mashq') rMashq();
  else if(tab==='ovqat') rOvqat();
  else if(tab==='progress') rProgress();
  else rInfo();
}

function rMashq(){
  var w=W[CW]; var html='';
  // week grid
  html+='<div class="st">Hafta tanlang</div><div class="wgrid">';
  for(var i=1;i<=12;i++){
    var c=i===CW?'cur':W[i].done?'done':'';
    html+='<button class="wb '+c+'" onclick="selW('+i+')">'+i+'</button>';
  }
  html+='</div>';
  // month row
  var m=mo(CW); var mc={1:'#4a7acc',2:'#4aaa78',3:'#c9a84c'};
  html+='<div style="display:flex;gap:7px;margin-bottom:13px">';
  [1,2,3].forEach(function(mn){
    var a=mn===m; var c=mc[mn];
    html+='<div style="flex:1;padding:7px;border-radius:10px;background:'+(a?c+'18':'var(--bg2)')+';border:1px solid '+(a?c:'#2a2a4e')+';text-align:center"><div style="font-size:11px;font-weight:700;color:'+(a?c:'#445566')+'">'+mn+'-OY</div><div style="font-size:9px;color:#445566">'+(mn*4-3)+'-'+(mn*4)+' hafta</div></div>';
  });
  html+='</div>';
  // week info
  html+='<div style="padding:12px 15px;background:var(--bg2);border-radius:12px;border-left:3px solid '+(w.done?'#4aaa78':'var(--gold)')+';margin-bottom:13px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:10px;color:var(--dim)">'+w.sp+'</div><div style="font-size:15px;font-weight:700;margin-top:2px">'+w.th+'</div></div>'+(w.done?'<div style="background:#1a3a1a;border:1px solid #3a6a3a;border-radius:8px;padding:4px 10px;color:#4aaa78;font-size:11px">Bajarildi</div>':'')+'</div>';
  // days
  w.days.forEach(function(day,idx){
    var id='d'+idx; var op=OC===id;
    html+='<div class="card"><div class="ch" onclick="tC(\''+id+'\')"><div><div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><span class="dp">'+day.dy.toUpperCase()+'</span><span style="color:#445566;font-size:11px">'+day.ex.length+' mashq</span></div><div style="font-size:13px;font-weight:700">'+day.lb+'</div></div><span class="chev'+(op?' on':'')+'">&#9662;</span></div><div class="cb'+(op?' on':'')+'"><div style="height:7px"></div>';
    day.ex.forEach(function(ex){
      html+='<div class="ex"><div style="flex:1"><div class="en">'+ex.n+'</div>'+(ex.nt?'<div class="enote">'+ex.nt+'</div>':'')+'</div><div class="es">'+ex.s+'x'+ex.r+'</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('s-mashq').innerHTML=html;
  document.getElementById('wbadge').textContent=CW+'-HAFTA';
}

function rOvqat(){
  var m=mo(CW); var n=NUT[m]; var html='';
  html+='<div style="display:flex;gap:7px;margin-bottom:13px">';
  [1,2,3].forEach(function(mn){
    html+='<button style="flex:1;padding:8px 4px;border-radius:10px;border:1px solid '+(m===mn?'var(--gold)':'#2a2a4e')+';background:'+(m===mn?'var(--gold)':'var(--bg2)')+';color:'+(m===mn?'#090910':'var(--dim)')+';font-size:11px;font-weight:700;cursor:pointer" onclick="selM('+mn+')">'+mn+'-OY</button>';
  });
  html+='</div>';
  html+='<div class="mgrid">';
  [[n.cal,'#e86c4a','Kaloriya'],
   [n.pro,'#4aaa78','Oqsil'],
   [n.carb,'#4a88cc','Uglevodlar'],
   [n.fat,'var(--gold)','Yog\'']].forEach(function(x){
    html+='<div class="mc" style="border:1px solid '+x[1]+'33"><div class="ml">'+x[2]+'</div><div class="mv" style="color:'+x[1]+'">'+x[0]+'</div></div>';
  });
  html+='</div>';
  n.meals.forEach(function(meal,i){
    var op=OM===i;
    html+='<div class="card"><div class="ch" onclick="tM('+i+')"><div><div style="color:var(--gold);font-size:11px">'+meal.t+'</div><div style="font-size:14px;font-weight:700;margin-top:2px">'+meal.n+'</div></div><span class="chev'+(op?' on':'')+'">&#9662;</span></div><div class="cb'+(op?' on':'')+'"><div style="height:6px"></div>';
    meal.i.forEach(function(item){
      html+='<div class="mi"><span class="dot">&#10022;</span>'+item+'</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('s-ovqat').innerHTML=html;
}

function rProgress(){
  var total=36; var done=0;
  for(var k in DONE){ if(DONE[k]) done++; }
  // count weeks[w].done
  for(var wi=1;wi<=12;wi++){
    if(W[wi].done) W[wi].days.forEach(function(_,di){ DONE[wi+'-'+di]=true; });
  }
  for(var k in DONE){ if(DONE[k]) done++; }
  // recount properly
  done=0;
  for(var wi=1;wi<=12;wi++){
    W[wi].days.forEach(function(_,di){
      if(W[wi].done||DONE[wi+'-'+di]) done++;
    });
  }
  var pct=Math.round(done/total*100);
  var r=64; var circ=2*Math.PI*r; var dash=circ*(done/total);
  var html='<div class="st">Umumiy progress</div>';
  html+='<div class="ring-wrap"><svg width="150" height="150" viewBox="0 0 150 150"><circle cx="75" cy="75" r="'+r+'" fill="none" stroke="#1e1e38" stroke-width="12"/><circle cx="75" cy="75" r="'+r+'" fill="none" stroke="var(--gold)" stroke-width="12" stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round"/></svg><div class="ring-center"><div class="rnum">'+done+'</div><div class="rsub">/ '+total+' MASHQ</div><div style="font-size:13px;color:var(--gold);font-weight:700;margin-top:4px">'+pct+'%</div></div></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:15px">';
  var mc2={1:'#4a7acc',2:'#4aaa78',3:'#c9a84c'};
  [1,2,3].forEach(function(mn){
    var md=0,mt=0;
    for(var wi=(mn-1)*4+1;wi<=mn*4;wi++){
      W[wi].days.forEach(function(_,di){ mt++; if(W[wi].done||DONE[wi+'-'+di]) md++; });
    }
    html+='<div style="background:var(--bg2);border:1px solid '+mc2[mn]+'33;border-radius:11px;padding:11px;text-align:center"><div style="font-size:11px;color:var(--dim)">'+mn+'-OY</div><div style="font-size:20px;font-weight:700;color:'+mc2[mn]+';font-family:Bebas Neue,sans-serif;margin:3px 0">'+md+'/'+mt+'</div></div>';
  });
  html+='</div><div class="st">Mashg\'ulotlar</div>';
  for(var wi=1;wi<=12;wi++){
    var wd=W[wi];
    var allDone=wd.done||wd.days.every(function(_,di){return DONE[wi+'-'+di];});
    html+='<div class="wbox" style="border-color:'+(allDone?'#2a4a2a':'#2a2a3e')+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:11px;color:var(--dim)">'+wi+'-HAFTA <span style="color:#445566">'+wd.sp+'</span></span>'+(allDone?'<span style="color:#4aaa78;font-size:11px">Tugadi</span>':'')+'</div><div style="display:flex;gap:7px">';
    wd.days.forEach(function(day,di){
      var isDone=wd.done||DONE[wi+'-'+di];
      html+='<button class="pbtn'+(isDone?' done':'')+'" onclick="tW('+wi+','+di+')">'+(isDone?'&#10003; ':'')+day.dy.slice(0,3)+'</button>';
    });
    html+='</div></div>';
  }
  document.getElementById('s-progress').innerHTML=html;
}

  var tips=[
    {e:'&#x1F4A7;',t:"Suv",d:"Kuniga kamida 3 litr. Trenirovka kunlari 3.5L."},
    {e:'&#x1F634;',t:"Uyqu",d:"7-9 soat. Mushak uyquda o'sadi."},

    {e:'&#x1F9D8;',t:"Cho'zilish",d:"Trenirovkadan keyin 5 daqiqa stretching."},
    {e:'&#x1F4F8;',t:"Progress tekshiruvi",d:"Har oyning 1-kunida foto va og'irlik o'lchov."},
    {e:'&#x1F373;',t:"Meal Prep",d:"Haftada 2 marta ovqat tayyorla — vaqt tejaydi."},
    {e:'&#x1F6AB;',t:"Skip qilma",d:"O'tkazib yuborsang, oddiy rejani davom et."}
  ];
  var html='<div class="card" style="padding:14px 16px;margin-bottom:12px"><div class="st" style="margin-bottom:10px">3 oylik reja tuzilmasi</div>';
  [{m:"1-OY (1-4 hafta)",s:"Full Body",d:"Texnika + asos",c:"#4a7acc"},
   {m:"2-OY (5-8 hafta)",s:"Push/Pull/Legs",d:"Kuch + intensivlik",c:"#4aaa78"},
   {m:"3-OY (9-12 hafta)",s:"Upper/Lower",d:"Maksimal o'sish",c:"#c9a84c"}
  ].forEach(function(r){
    html+='<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a30"><div style="width:3px;background:'+r.c+';border-radius:2px;flex-shrink:0"></div><div><div style="font-size:12px;font-weight:700;color:'+r.c+'">'+r.m+'</div><div style="font-size:13px">'+r.s+' - '+r.d+'</div></div></div>';
  });
  html+='</div>';
  tips.forEach(function(tip){
    html+='<div class="ic"><span style="font-size:20px">'+tip.e+'</span><div><div style="color:var(--gold);font-size:12px;font-weight:700;margin-bottom:3px">'+tip.t+'</div><div style="color:#b0a898;font-size:13px;line-height:1.5">'+tip.d+'</div></div></div>';
  });
  html+='<div class="rbox"><div style="color:#4aaa78;font-weight:700;font-size:14px;margin-bottom:8px">&#x1F3C6; 3 oydan keyin kutilgan natija</div><div style="color:#7aaa7a;font-size:13px;line-height:1.8">3-6 kg toza mushak massasi<br>Bench: +20-30kg | Squat: +30-40kg | Deadlift: +40-50kg<br>Tana kompozitsiyasi sezilarli yaxshilanadi</div></div>';
  document.getElementById('s-info').innerHTML=html;
}

function selW(w){ CW=w; OC=null; rMashq(); }
function selM(m){ CW=(m-1)*4+1; OM=null; rOvqat(); }
function tC(id){ OC=OC===id?null:id; rMashq(); }
function tM(i){ OM=OM===i?null:i; rOvqat(); }
function tW(w,di){
  if(W[w].done) return;
  var k=w+'-'+di;
  DONE[k]=!DONE[k];
  rProgress();
}

// init
rMashq();
