<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:wght@400;500;700&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #f0cc70;
    --bg: #090910;
    --bg2: #111120;
    --bg3: #181830;
    --text: #e8e0d0;
    --text-dim: #7a8899;
    --green: #4aaa78;
    --blue: #4a88cc;
    --red: #e86c4a;
    --safe-top: env(safe-area-inset-top, 44px);
    --safe-bot: env(safe-area-inset-bottom, 34px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    padding-bottom: calc(70px + var(--safe-bot));
  }

  /* HEADER */
  .header {
    background: linear-gradient(180deg, #12122e 0%, #090910 100%);
    padding: calc(var(--safe-top) + 14px) 20px 16px;
    border-bottom: 1px solid #c9a84c22;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { display: flex; justify-content: space-between; align-items: center; }
  .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .week-badge { background: var(--gold); color: #090910; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 1px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: #0d0d20;
    border-top: 1px solid #2a2a4e;
    padding: 10px 0 calc(var(--safe-bot));
    display: flex;
  }
  .nav-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 4px 0;
  }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: var(--text-dim); transition: color 0.2s; }
  .nav-btn.active .nav-label { color: var(--gold); }
  .nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px var(--gold)); }

  /* SCREENS */
  .screen { display: none; padding: 16px; animation: fadeIn 0.2s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card {
    background: var(--bg2);
    border: 1px solid #2a2a4e;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .card-header {
    padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; -webkit-user-select: none;
  }
  .card-body { display: none; padding: 0 16px 14px; border-top: 1px solid #1e1e38; }
  .card-body.open { display: block; }

  /* WEEK GRID */
  .week-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 14px; }
  .week-btn {
    aspect-ratio: 1; border-radius: 12px; border: 1.5px solid #2a2a4e;
    background: var(--bg2); color: var(--text-dim);
    font-size: 15px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative; transition: all 0.15s;
  }
  .week-btn.done { border-color: #2a4a2a; background: #0d1f0d; color: var(--green); }
  .week-btn.active { background: var(--gold); border-color: var(--gold); color: #090910; }
  .week-btn.done::after { content: '✓'; position: absolute; top: -4px; right: -3px; font-size: 9px; background: var(--green); color: #090910; border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }

  /* EXERCISE ROW */
  .ex-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid #16162a;
    gap: 12px;
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-name { font-size: 13px; color: var(--text); }
  .ex-note { font-size: 11px; color: #4a6a7a; margin-top: 2px; font-style: italic; }
  .ex-sets { background: #1e1e38; padding: 4px 10px; border-radius: 8px; color: var(--gold); font-weight: 700; font-size: 12px; white-space: nowrap; flex-shrink: 0; }

  /* MACRO GRID */
  .macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .macro-card { background: #0f0f1e; border-radius: 12px; padding: 12px 14px; }
  .macro-label { font-size: 11px; color: var(--text-dim); }
  .macro-val { font-size: 16px; font-weight: 700; margin-top: 3px; }

  /* MEAL */
  .meal-time { font-size: 11px; color: var(--gold); }
  .meal-name { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .meal-item { display: flex; gap: 8px; padding: 7px 0; border-bottom: 1px solid #14142a; font-size: 13px; color: #c0b8a8; }
  .meal-item:last-child { border: none; }
  .meal-dot { color: var(--gold); font-size: 10px; margin-top: 2px; flex-shrink: 0; }

  /* PROGRESS */
  .progress-ring { display: flex; justify-content: center; margin: 20px 0; }
  .ring-wrap { position: relative; width: 160px; height: 160px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--gold); line-height: 1; }
  .ring-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-top: 2px; }

  /* MONTH TABS */
  .month-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .month-tab { flex: 1; padding: 8px 4px; border-radius: 10px; border: 1px solid #2a2a4e; background: var(--bg2); color: var(--text-dim); font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .month-tab.active { background: var(--gold); border-color: var(--gold); color: #090910; }

  /* SPLIT BADGE */
  .split-badge { display: inline-block; background: #1e1e38; color: var(--text-dim); font-size: 10px; padding: 3px 8px; border-radius: 6px; letter-spacing: 1px; margin-bottom: 4px; }

  /* DAY PILL */
  .day-pill { background: #c9a84c18; color: var(--gold); font-size: 10px; padding: 2px 8px; border-radius: 6px; letter-spacing: 1px; }

  /* INFO CARDS */
  .info-card { background: var(--bg2); border: 1px solid #2a2a4e; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 12px; }
  .info-icon { font-size: 20px; flex-shrink: 0; }
  .info-title { color: var(--gold); font-size: 12px; font-weight: 700; margin-bottom: 3px; }
  .info-text { color: #b0a898; font-size: 13px; line-height: 1.5; }

  /* CHEVRON */
  .chev { color: var(--gold); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
  .chev.open { transform: rotate(180deg); }

  /* SECTION TITLE */
  .sec-title { font-size: 10px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }

  /* RESULT BOX */
  .result-box { background: #0d1f0d; border: 1px solid #2a4a2a; border-radius: 14px; padding: 16px; margin-top: 4px; }

  /* ADD TO HOME BANNER */
  .add-banner { background: linear-gradient(135deg, #1a1a38, #12122e); border: 1px solid var(--gold); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 12px; align-items: flex-start; }
  .add-banner-text { flex: 1; }
  .add-banner-title { color: var(--gold); font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .add-banner-desc { color: var(--text-dim); font-size: 11px; line-height: 1.5; }
  .close-btn { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 0; }

  .divider { height: 1px; background: #1e1e38; margin: 10px 0; }
</style>
</head>

function monthOf(w) { return w <= 4 ? 1 : w <= 8 ? 2 : 3; }
function totalDone() { return Object.keys(completedWorkouts).filter(k=>completedWorkouts[k]).length; }

function renderMashq() {
  const w = weeks[currentWeek];
  const done = w.done;
  let html = '';

  // iOS banner
  if (!localStorage.getItem('bannerDismissed')) {
    html += `<div class="add-banner" id="addBanner">
      <span style="font-size:24px">📱</span>
      <div class="add-banner-text">
        <div class="add-banner-title">Ekranga qo'shing!</div>
        <div class="add-banner-desc">Safari → <strong style="color:var(--gold)">⬆ Share</strong> → <strong style="color:var(--gold)">Add to Home Screen</strong> — ilova kabi ishlaydi</div>
      </div>
      <button class="close-btn" onclick="dismissBanner()">×</button>
    </div>`;
  }

  // Week selector
  html += `<div class="sec-title">Hafta tanlang</div>
  <div class="week-grid">`;
  for (let i=1; i<=12; i++) {
    const wd = weeks[i];
    const cls = i === currentWeek ? 'active' : wd.done ? 'done' : '';
    html += `<button class="week-btn ${cls}" onclick="selectWeek(${i})">${i}</button>`;
  }
  html += `</div>`;

  // Month indicator
  const m = monthOf(currentWeek);
  const mColors = {1:'#4a7acc', 2:'#4aaa78', 3:'#c9a84c'};
  const mc = mColors[m];
  html += `<div style="display:flex;gap:8px;margin-bottom:14px">`;
  [1,2,3].forEach(mn => {
    const active = mn === m;
    html += `<div style="flex:1;padding:7px;border-radius:10px;background:${active?mc+'18':'var(--bg2)'};border:1px solid ${active?mc:'#2a2a4e'};text-align:center">
      <div style="font-size:11px;font-weight:700;color:${active?mc:'#445566'}">${mn}-OY</div>
      <div style="font-size:9px;color:#445566">${mn*4-3}-${mn*4}-hafta</div>
    </div>`;
  });
  html += `</div>`;

  // Week info
  html += `<div style="padding:12px 16px;background:var(--bg2);border-radius:12px;border-left:3px solid ${done?'#4aaa78':'var(--gold)'};margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
    <div>
      <div style="font-size:10px;color:var(--text-dim);letter-spacing:1px">${w.split}</div>
      <div style="font-size:15px;font-weight:700;margin-top:2px">${w.theme}</div>
    </div>
    ${done ? '<div style="background:#1a3a1a;border:1px solid #3a6a3a;border-radius:8px;padding:4px 10px;color:#4aaa78;font-size:11px">✓ Bajarildi</div>' : ''}
  </div>`;

  // Days
  w.days.forEach((day, idx) => {
    const cardId = `day-${idx}`;
    const isOpen = openCard === cardId;
    html += `<div class="card">
      <div class="card-header" onclick="toggleCard('${cardId}')">
        <div>
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:4px">
            <span class="day-pill">${day.day.toUpperCase()}</span>
            <span style="color:#445566;font-size:11px">${day.ex.length} mashq</span>
          </div>
          <div style="font-size:14px;font-weight:700">${day.label}</div>
        </div>
        <span class="chev ${isOpen?'open'}">▾</span>
      </div>
      <div class="card-body ${isOpen?'open'}">
        <div style="height:8px"></div>`;
    day.ex.forEach((ex, ei) => {
      html += `<div class="ex-row">
        <div style="flex:1">
          <div class="ex-name">${ex.n}</div>
          ${ex.note ? `<div class="ex-note">↳ ${ex.note}</div>` : ''}
        </div>
        <div class="ex-sets">${ex.s}×${ex.r}</div>
      </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('screen-mashq').innerHTML = html;
  document.getElementById('currentWeekBadge').textContent = `${currentWeek}-HAFTA`;
}

function renderProgress() {
  const total = 36; // 12 weeks × 3 days
  const done = totalDone();
  const pct = Math.round((done / total) * 100);
  const r = 68, circ = 2 * Math.PI * r;
  const dash = circ * (done / total);

  let html = `
  <div class="sec-title">Umumiy progress</div>
  <div class="progress-ring">
    <div class="ring-wrap">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="${r}" fill="none" stroke="#1e1e38" stroke-width="12"/>
        <circle cx="80" cy="80" r="${r}" fill="none" stroke="var(--gold)" stroke-width="12"
          stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
          style="transition:stroke-dasharray 0.5s ease"/>
      </svg>
      <div class="ring-center">
        <div class="ring-num">${done}</div>
        <div class="ring-sub">/ ${total} MASHQ</div>
        <div style="font-size:13px;color:var(--gold);margin-top:4px;font-weight:700">${pct}%</div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px">`;

  [1,2,3].forEach(mn => {
    const start = (mn-1)*4 + 1, end = mn*4;
    let mDone = 0, mTotal = 0;
    for (let w = start; w <= end; w++) {
      weeks[w].days.forEach((_, di) => {
        mTotal++;
        if (completedWorkouts[`${w}-${di}`]) mDone++;
        if (weeks[w].done) completedWorkouts[`${w}-${di}`] = true;
      });
    }
    const mColors = {1:'#4a7acc',2:'#4aaa78',3:'#c9a84c'};
    html += `<div style="background:var(--bg2);border:1px solid ${mColors[mn]}33;border-radius:12px;padding:12px;text-align:center">
      <div style="font-size:11px;color:var(--text-dim)">${mn}-OY</div>
      <div style="font-size:22px;font-weight:700;color:${mColors[mn]};font-family:'Bebas Neue',sans-serif;margin:4px 0">${mDone}/${mTotal}</div>
    </div>`;
  });

  html += `</div><div class="sec-title">Mashg'ulotlar</div>`;

  // Per week checklist
  for (let w = 1; w <= 12; w++) {
    const wd = weeks[w];
    const wDone = wd.done || wd.days.every((_,di) => completedWorkouts[`${w}-${di}`]);
    html += `<div style="background:var(--bg2);border:1px solid ${wDone?'#2a4a2a':'#2a2a4e'};border-radius:12px;padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div>
          <span style="font-size:11px;color:var(--text-dim)">${w}-HAFTA</span>
          <span style="font-size:11px;color:#445566;margin-left:6px">${wd.split}</span>
        </div>
        ${wDone ? '<span style="color:#4aaa78;font-size:12px">✓ Tugadi</span>' : ''}
      </div>
      <div style="display:flex;gap:8px">`;
    wd.days.forEach((day, di) => {
      const k = `${w}-${di}`;
      const isDone = wd.done || completedWorkouts[k];
      html += `<button onclick="toggleWorkout(${w},${di})" style="flex:1;padding:8px 4px;border-radius:8px;border:1px solid ${isDone?'#2a4a2a':'#2a2a4e'};background:${isDone?'#0d1f0d':'var(--bg)'};color:${isDone?'#4aaa78':'var(--text-dim)'};font-size:11px;cursor:pointer;font-weight:600">
        ${isDone?'✓ ':''} ${day.day.slice(0,3)}
      </button>`;
    });
    html += `</div></div>`;
  }

  document.getElementById('screen-progress').innerHTML = html;
}

  [{m:"1-OY (1-4 hafta)",s:"Full Body",d:"Texnika + asos",c:"#4a7acc"},
   {m:"2-OY (5-8 hafta)",s:"Push/Pull/Legs",d:"Kuch + intensivlik",c:"#4aaa78"},
   {m:"3-OY (9-12 hafta)",s:"Upper/Lower",d:"Maksimal o'sish",c:"#c9a84c"}
  ].forEach(r => {
    html += `<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a30">
      <div style="width:3px;background:${r.c};border-radius:2px;flex-shrink:0"></div>
      <div>
        <div style="font-size:12px;font-weight:700;color:${r.c}">${r.m}</div>
        <div style="font-size:13px;color:var(--text)">${r.s} — ${r.d}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  tips.forEach(tip => {
    html += `<div class="info-card">
      <span class="info-icon">${tip.e}</span>
      <div><div class="info-title">${tip.t}</div><div class="info-text">${tip.d}</div></div>
    </div>`;
  });

  html += `<div class="result-box">
    <div style="color:#4aaa78;font-weight:700;font-size:14px;margin-bottom:8px">🏆 3 oydan keyin kutilgan natija</div>
    <div style="color:#7aaa7a;font-size:13px;line-height:1.8">
      • 3–6 kg toza mushak massasi<br>
      • Bench: +20-30kg · Squat: +30-40kg · Deadlift: +40-50kg<br>
      • Tana kompozitsiyasi sezilarli yaxshilanadi<br>
      • Mushak ta'rifi paydo bo'la boshlaydi
    </div>
  </div>`;

  document.getElementById('screen-info').innerHTML = html;
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  btn.classList.add('active');
  openCard = null; openMeal = null;
  if (tab === 'mashq') renderMashq();
  else if (tab === 'ovqat') renderOvqat();
  else if (tab === 'progress') renderProgress();
  else if (tab === 'info') renderInfo();
}

function selectWeek(w) {
  currentWeek = w; openCard = null;
  renderMashq();
}

function selectMonth(m) {
  // find first week of that month
  currentWeek = (m-1)*4 + 1;
  openMeal = null;
  renderOvqat();
}

function toggleCard(id) {
  openCard = openCard === id ? null : id;
  renderMashq();
}

function toggleMeal(i) {
  openMeal = openMeal === i ? null : i;
  renderOvqat();
}

function toggleWorkout(w, di) {
  if (weeks[w].done) return;
  const k = `${w}-${di}`;
  completedWorkouts[k] = !completedWorkouts[k];
  localStorage.setItem('cw', JSON.stringify(completedWorkouts));
  renderProgress();
}

function dismissBanner() {
  localStorage.setItem('bannerDismissed', '1');
  renderMashq();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderMashq();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
